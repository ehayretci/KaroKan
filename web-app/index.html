<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fdfdff">
  <title>karokan</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="karokan.css">
</head>
<body>

  <!-- START SCREEN -->
  <section id="start-screen">
    <h1 id="title">
      <span class="title-red">karo</span><span class="title-blue">kan</span>
    </h1>
    <button id="play-btn">Play Game</button>
    <p id="creator">Created by: Erim Hayretci</p>
  </section>


  <!-- NAME ENTRY MODAL -->
  <div id="name-modal" hidden>
    <div id="name-modal-inner">
      <h2>Enter Player Names</h2>
      <div class="name-field">
        <label class="name-label" for="name-red">
          <span class="label-dot red-dot"></span>Red Player
        </label>
        <input type="text" id="name-red" placeholder="Red" maxlength="18" autocomplete="off">
      </div>
      <div class="name-field">
        <label class="name-label" for="name-blue">
          <span class="label-dot blue-dot"></span>Blue Player
        </label>
        <input type="text" id="name-blue" placeholder="Blue" maxlength="18" autocomplete="off">
      </div>
      <button id="confirm-names-btn">Start Game</button>
    </div>
  </div>


  <!-- GAME SCREEN -->
  <section id="game-screen" hidden>

    <!-- STAGE INDICATOR -->
    <div id="stage-bar">
      <span id="stage-dot" class="stage-dot"></span>
      <span id="stage-name"></span>
      <span class="stage-sep">·</span>
      <span id="stage-action"></span>
    </div>

    <div id="game-layout">

      <!-- RED PANEL -->
      <div id="panel-red" class="panel red">
        <strong id="red-name-display">Red</strong>
        <div id="holders-red" class="stone-holders"></div>
      </div>

      <!-- BOARD + CONTROLS -->
      <div id="board-area">
        <div id="grid-frame">
          <div id="grid"></div>
        </div>
        <div id="controls">
          <button data-dir="nw" aria-label="Move up-left"><span class="arrow">→</span></button>
          <button data-dir="ne" aria-label="Move up-right"><span class="arrow">→</span></button>
          <button data-dir="w"  aria-label="Move left"><span class="arrow">→</span></button>
          <button data-dir="e"  aria-label="Move right"><span class="arrow">→</span></button>
          <button data-dir="sw" aria-label="Move down-left"><span class="arrow">→</span></button>
          <button data-dir="se" aria-label="Move down-right"><span class="arrow">→</span></button>
        </div>
      </div>

      <!-- BLUE PANEL -->
      <div id="panel-blue" class="panel blue">
        <strong id="blue-name-display">Blue</strong>
        <div id="holders-blue" class="stone-holders"></div>
      </div>

    </div>

    <!-- WIN OVERLAY -->
    <div id="overlay" hidden>
      <div id="confetti-area"></div>
      <div id="winner-text"></div>
      <button id="again-btn">New Game</button>
    </div>

  </section>


  <script src="main.js"></script>
</body>
</html>
