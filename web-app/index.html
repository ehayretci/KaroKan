<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>karokan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="karokan.css">
</head>
<body>

  <!-- START SCREEN -->
  <section id="start-screen">
    <h1 id="title">
      <span class="title-red">karo</span><span class="title-blue">kan</span>
    </h1>
    <p id="tagline">A two-player strategy game on a hexagonal board.</p>
    <button id="play-btn">Play Game</button>
  </section>


  <!-- GAME SCREEN -->
  <section id="game-screen" hidden>
    <div id="container">
      <!-- grid only -->
      <div id="left">
        <div id="grid"></div>
      </div>
      <!-- score panels and controls -->
      <div id="right">
        <div id="panel-red" class="panel red">
          <strong>Red Player</strong>
          <div>Score: <span id="score-red">0</span></div>
        </div>
        <div id="panel-blue" class="panel blue">
          <strong>Blue Player</strong>
          <div>Score: <span id="score-blue">0</span></div>
        </div>
        <div id="controls">
          <button data-dir="nw" aria-label="Move up-left"><span class="arrow">→</span></button>
          <button data-dir="ne" aria-label="Move up-right"><span class="arrow">→</span></button>
          <button data-dir="w"  aria-label="Move left"><span class="arrow">→</span></button>
          <button data-dir="e"  aria-label="Move right"><span class="arrow">→</span></button>
          <button data-dir="sw" aria-label="Move down-left"><span class="arrow">→</span></button>
          <button data-dir="se" aria-label="Move down-right"><span class="arrow">→</span></button>
        </div>
      </div>
    </div>

    <!-- WIN -->
    <div id="overlay" hidden>
      <div id="winner-text"></div>
      <button id="again-btn">New Game</button>
    </div>
  </section>


  <script src="main.js"></script>
</body>
</html>
